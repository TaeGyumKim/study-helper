name: Build & Publish Docker Image

on:
  push:
    tags:
      - 'v*'   # v1.0.0, v1.0.0-beta 등 v로 시작하는 태그 push 시 자동 실행

permissions:
  contents: write  # GitHub Release 생성 권한

jobs:
  # ── Docker 이미지 빌드 및 Docker Hub 배포 ──────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Buildx 설정 (멀티 플랫폼 빌드용)
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 이미지 태그 및 메타데이터 생성
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/study-helper
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 빌드 및 Docker Hub 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64   # Intel + Apple Silicon 대응
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release 생성 ────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: CHANGELOG에서 현재 버전 패치노트 추출
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          NOTES=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: study-helper ${{ github.ref_name }}
          body: |
            # study-helper ${{ github.ref_name }}

            숭실대학교 LMS 강의 영상 재생 · 다운로드 · AI 요약 도구.

            ---

            ## 패치노트

            ${{ steps.changelog.outputs.notes }}

            ---

            ## 사전 요구사항

            - **Docker Desktop** ([다운로드](https://www.docker.com/products/docker-desktop/))
              - Windows 사용자는 **WSL2** 활성화 필요 ([가이드](https://learn.microsoft.com/ko-kr/windows/wsl/install))

            ---

            ## 설치 및 실행

            1. 아래 첨부 파일(`.env.example`) 다운로드 후 `.env`로 이름 변경

            2. `.env` 파일 열어 필요한 값 설정 (학번/비밀번호는 첫 실행 시 자동 저장)

            3. 실행
            ```bash
            docker compose run --rm study-helper
            ```

            ---

            ## Docker 이미지 직접 사용

            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/study-helper:${{ github.ref_name }}
            ```

          files: .env.example
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          draft: false
